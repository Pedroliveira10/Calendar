<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pedro Pro Calendar</title>


<style>
:root{--bg:#f5f5f7;--surface:#fff;--text:#1d1d1f;--muted:#86868b;--accent:#0071e3}
body{margin:0;font-family:-apple-system,Inter,sans-serif;background:var(--bg);color:var(--text);transition:.25s}
body.dark{--bg:#1c1c1e;--surface:#2c2c2e;--text:#fff;--muted:#a1a1a6}
#app{max-width:430px;margin:auto;padding:16px;transition:.3s}
#app.laptop{max-width:900px}
.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
button{border:none;border-radius:10px;padding:8px 12px;cursor:pointer}
.event{background:var(--surface);padding:14px;margin-bottom:10px;border-radius:16px;cursor:grab;transition:.2s}
.event:active{transform:scale(.96);box-shadow:0 6px 16px rgba(0,0,0,.2)}
.fade{animation:fade .25s}
@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.small{font-size:12px;color:var(--muted)}
.section{margin-top:18px;font-weight:600;font-size:14px}
input{padding:6px;border-radius:8px;border:1px solid #ccc}
.streak{font-size:11px;color:var(--accent)}
#statsModal{position:fixed;inset:0;background:rgba(0,0,0,.4);display:none;align-items:center;justify-content:center}
#statsModal.open{display:flex}
.statsBox{background:var(--surface);padding:20px;border-radius:16px;width:90%;max-width:400px}
.bar{height:10px;border-radius:6px;background:var(--surface);margin-top:4px;overflow:hidden}
.fill{height:100%;background:var(--accent)}
</style>
</head>

<body>
<div id="app">

<div class="header">
  <h2>📅 Pro Calendar</h2>
  <div>
    <button onclick="toggleTheme()">🌙</button>
    <button onclick="toggleLayout()">💻</button>
    <button onclick="openStats()">📊</button>
  </div>
</div>

<div>
  <input type="date" id="datePicker" onchange="render()">
  <button onclick="addEvent()">+ Event</button>
</div>


<div id="events"></div>

<div class="section">✅ Habits</div>
<button onclick="addHabit()">+ Habit</button>
<div id="habits"></div>

<div class="section">🎨 Color Theme</div>
<input type="color" onchange="setAccent(this.value)">


</div>

<div id="statsModal">
  <div class="statsBox">
    <h3>Stats</h3>
    <div id="statsContent"></div>
    <button onclick="closeStats()">Close</button>
  </div>
</div>


<script>
let events = JSON.parse(localStorage.getItem('events')||'[]');
let habits = JSON.parse(localStorage.getItem('habits')||'[]');
let dragIndex;

function save(){
  localStorage.setItem('events',JSON.stringify(events));
  localStorage.setItem('habits',JSON.stringify(habits));
}

function getDate(){return document.getElementById('datePicker').value || new Date().toISOString().split('T')[0];}
function render(){renderEvents();renderHabits();}
function renderEvents(){
  const el=document.getElementById('events'); el.innerHTML='';
  const d=getDate();
  const day=events.filter(e=>e.date===d);


  day.forEach((e,i)=>{
    const div=document.createElement('div');
    div.className='event fade';
    div.draggable=true;
    div.ondragstart=()=>dragIndex=i;
    div.ondrop=()=>dropEvent(i);
    div.ondragover=e=>e.preventDefault();
    div.innerHTML=`<b>${e.title}</b>
    <div class="small">${e.time||''}</div>
    <button onclick="deleteEvent(${i})">🗑</button>`;
    el.appendChild(div);
  });

  if(day.length===0) el.innerHTML='<div class="small">No events</div>';
}

function dropEvent(i){
  const d=getDate();
  const map=events.map((e,idx)=>({e,idx})).filter(x=>x.e.date===d).map(x=>x.idx);
  const from=map[dragIndex];
  const to=map[i];
  const item=events[from];
  events.splice(from,1);
  events.splice(to,0,item);
  save();render();
}

function addEvent(){
  const title=prompt('Title'); if(!title)return;
  events.push({title,date:getDate()});
  save();render();
}


function deleteEvent(i){
  const d=getDate();
  let c=0;
  events=events.filter(e=>{
    if(e.date===d){if(c===i){c++;return false}c++;return true}
    return true
  });
  save();render();
}

function renderHabits(){
  const el=document.getElementById('habits'); el.innerHTML='';


  habits.forEach((h,i)=>{
    const streak=calculateStreak(h);
    const div=document.createElement('div');
    div.className='event fade';
    div.innerHTML=`${h.name}
      <div class="streak">🔥 ${streak} days</div>
      <button onclick="toggleHabit(${i})">${isDoneToday(h)?'✅':'⭕'}</button>
      <button onclick="deleteHabit(${i})">🗑</button>`;
    el.appendChild(div);
  });
}

function addHabit(){
  const name=prompt('Habit'); if(!name)return;
  habits.push({name,history:{}});
  save();render();
}

function today(){return new Date().toISOString().split('T')[0]}


function isDoneToday(h){return h.history?.[today()];}


function toggleHabit(i){
  const d=today();
  if(!habits[i].history) habits[i].history={};
  habits[i].history[d]=!habits[i].history[d];
  save();render();
}

function calculateStreak(h){
  let streak=0;
  let d=new Date();
  while(true){
    const key=d.toISOString().split('T')[0];
    if(h.history && h.history[key]){
      streak++;
      d.setDate(d.getDate()-1);
    } else break;
  }
  return streak;
}

function deleteHabit(i){habits.splice(i,1);save();render();}


function openStats(){
  const el=document.getElementById('statsContent');
  let html='';


  habits.forEach(h=>{
    const total=Object.values(h.history||{}).filter(v=>v).length;
    const streak=calculateStreak(h);
    html+=`<div style="margin-bottom:10px">
      <b>${h.name}</b>
      <div class="small">Total: ${total} | Streak: ${streak}</div>
      <div class="bar"><div class="fill" style="width:${total*5}%"></div></div>
    </div>`;
  });


  el.innerHTML=html||'No data yet';
  document.getElementById('statsModal').classList.add('open');
}


function closeStats(){document.getElementById('statsModal').classList.remove('open');}


function toggleTheme(){
  document.body.classList.toggle('dark');
  localStorage.setItem('theme',document.body.classList.contains('dark'));
}

function toggleLayout(){
  document.getElementById('app').classList.toggle('laptop');
}

function setAccent(color){document.documentElement.style.setProperty('--accent',color);}


function init(){
  document.getElementById('datePicker').value=new Date().toISOString().split('T')[0];
  if(localStorage.getItem('theme')==='true')document.body.classList.add('dark');
  render();
}
init();
</script>
</body>
